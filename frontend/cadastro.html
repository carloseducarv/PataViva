<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro para Adoção - PataViva</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="cadastro-page">

  <!-- HEADER -->
  <header>
    <img src="logo.png" class="logo">

    <nav>
      <a href="index.html">Início</a>
      <a href="#">Adoção</a>
      <a href="#">Como Ajudar</a>
      <a href="sobre.html">Sobre</a>
      <a href="#contato">Contato</a>
      <a href="login.html" class="login-btn">Login</a>
    </nav>
  </header>

  <!-- FORMULÁRIO -->
  <section class="cadastro-container">

    <div class="cadastro-card">
      <h2>Cadastro para Adoção ou Doação</h2>

      <form>

        <h3>Dados Pessoais</h3>
        <input type="text" placeholder="Nome completo" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Telefone" required>

        <h3>Moradia</h3>
        <select required>
          <option value="">Tipo de moradia</option>
          <option>Casa</option>
          <option>Apartamento</option>
        </select>

        <input type="text" placeholder="Possui quintal?">

        <h3>Experiência</h3>
        <select>
          <option>Já teve pet?</option>
          <option>Sim</option>
          <option>Não</option>
        </select>

        <input type="text" placeholder="Possui outros animais?">

        <h3>Rotina</h3>
        <input type="text" placeholder="Quanto tempo fica fora de casa?">

        <label class="checkbox">
          <input type="checkbox" required>
          Estou ciente da responsabilidade de cuidar do animal
        </label>

        <button type="submit">Cadastrar</button>

      </form>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="rodape-pata-viva" id="contato">
    <div class="container-footer">

      <div class="bloco-logo">
        <img src="logo.png" class="logo-rodape">
        <p>Organização de Amparo Animal</p>
      </div>

      <div class="bloco-info">
        <p><strong>Dúvidas e contato:</strong></p>
        <p>contato@pataviva.org.br</p>
        <p>São Paulo - SP</p>
      </div>

    </div>
  </footer>

</body>
</html>
